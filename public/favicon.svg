<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- тёмный фон -->
  <rect width="64" height="64" rx="8" fill="#1C1C1E"/>

  <!--
    Буква Д (Russo One) — красная, левая половина
    path построен вручную по форме буквы Д:
    прямоугольник с ножками снизу
  -->
  <!-- основное тело Д: П-образная форма -->
  <path d="
    M6,14 H27 V46 H24 V17 H9 V46 H6 V14 Z
  " fill="#C0392B"/>
  <!-- нижняя перекладина -->
  <rect x="4" y="46" width="25" height="3.5" fill="#C0392B"/>
  <!-- левый хвостик -->
  <rect x="4" y="49.5" width="3.5" height="4" fill="#C0392B"/>
  <!-- правый хвостик -->
  <rect x="25.5" y="49.5" width="3.5" height="4" fill="#C0392B"/>

  <!--
    Буква И (Russo One) — белая, правая половина
    И = две вертикали + диагональ сверху-справа вниз-влево
  -->
  <!-- левая вертикаль -->
  <rect x="36" y="14" width="4" height="39" fill="#FFFFFF"/>
  <!-- правая вертикаль -->
  <rect x="56" y="14" width="4" height="39" fill="#FFFFFF"/>
  <!-- диагональная перекладина -->
  <polygon points="40,14 60,14 60,20 56,20 40,47 36,47 36,41 52,14" fill="#FFFFFF"/>
</svg>
