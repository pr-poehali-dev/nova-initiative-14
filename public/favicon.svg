<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">

  <!-- ===== Буква Д (красная, левая половина) ===== -->
  <!-- левая стойка -->
  <rect x="1" y="5" width="2.5" height="18" fill="#C0392B"/>
  <!-- правая стойка -->
  <rect x="10.5" y="5" width="2.5" height="18" fill="#C0392B"/>
  <!-- верхняя полка -->
  <rect x="1" y="5" width="12" height="2.5" fill="#C0392B"/>
  <!-- нижняя полка -->
  <rect x="1" y="21" width="12" height="2.5" fill="#C0392B"/>
  <!-- левый хвостик -->
  <rect x="0" y="23.5" width="2.5" height="2.5" fill="#C0392B"/>
  <!-- правый хвостик -->
  <rect x="10.5" y="23.5" width="2.5" height="2.5" fill="#C0392B"/>

  <!-- ===== Буква И (тёмная, правая половина) ===== -->
  <!-- левая стойка -->
  <rect x="17" y="5" width="2.5" height="22" fill="#1A1A2E"/>
  <!-- правая стойка -->
  <rect x="27.5" y="5" width="2.5" height="22" fill="#1A1A2E"/>
  <!-- диагональная перекладина: сверху-справа вниз-влево -->
  <polygon points="19.5,5 30,5 30,8.5 27.5,8.5 19.5,19 17,19 17,15.5 24.5,5" fill="#1A1A2E"/>
  <polygon points="17,15.5 19.5,15.5 27.5,26 30,26 30,23.5 22.5,23.5 17,23.5 17,19" fill="#1A1A2E"/>

</svg>
