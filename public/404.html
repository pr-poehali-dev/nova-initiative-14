<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, follow" />
  <meta name="prerender-status-code" content="404" />
  <title>Страница не найдена · 404 · Диплом-Инж.рф</title>
  <meta name="description" content="Запрашиваемая страница не найдена на сайте Диплом-Инж.рф. Перейдите на главную или к разделам наставничества и облачного CAE." />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    :root {
      --bg: #f4f5f7;
      --line: #1a1a1a;
      --thin: #555;
      --accent: #d4321e;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #14161a; --line: #e8e8e8; --thin: #9aa0a6; }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg);
      color: var(--line);
      font-family: ui-sans-serif, system-ui, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 24px; line-height: 1.6;
    }
    .wrap { max-width: 640px; width: 100%; }
    .code {
      font-size: 96px; font-weight: 900; letter-spacing: -2px;
      line-height: 1; margin: 0 0 8px; color: var(--accent);
    }
    h1 {
      font-size: 26px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.5px; margin: 0 0 16px;
    }
    p { color: var(--thin); margin: 0 0 24px; font-size: 16px; }
    .links { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 28px; }
    .btn {
      display: inline-flex; align-items: center; text-decoration: none;
      border: 2px solid var(--line); color: var(--line);
      padding: 10px 18px; font-weight: 700; font-size: 14px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .btn-accent { border-color: var(--accent); color: #fff; background: var(--accent); }
    nav.more a { color: var(--thin); text-decoration: underline; font-size: 14px; margin-right: 16px; }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="code">404</div>
    <h1>Страница не найдена</h1>
    <p>Возможно, адрес введён с ошибкой или страница была перемещена. Вернитесь на главную или выберите нужный раздел ниже.</p>
    <div class="links">
      <a class="btn btn-accent" href="/">На главную</a>
      <a class="btn" href="/cae">Облачный CAE</a>
      <a class="btn" href="/blog">Блог инженера</a>
    </div>
    <nav class="more">
      <a href="/program">Программа наставничества</a>
      <a href="/cae/raschet-balki-onlayn">Расчёт балки онлайн</a>
      <a href="/faq">Частые вопросы</a>
      <a href="/contacts">Контакты</a>
    </nav>
  </main>
</body>
</html>
