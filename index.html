<body>
<div id="root">
  <noscript>
    <div style="font-family:system-ui,sans-serif;padding:24px;text-align:center">
      Для работы сайта нужно включить JavaScript в браузере.

<script>
  /*
   * Тихий авто-recovery от устаревшего кэша после деплоя.
   *
   * Принцип: пользователь НЕ ДОЛЖЕН видеть никаких сообщений и кнопок.
   * Все возможные сбои чиним в фоне через hard-reload с очисткой кэша.
   *
   * Что отслеживаем:
   *  1. window.error / unhandledrejection с признаком ChunkLoadError —
   *     значит после деплоя поменялись имена чанков, у пользователя битый кэш.
   *  2. Через 8 секунд после старта проверяем, отрисовал ли React что-нибудь
   *     в #root. Если пусто — бандл не успел загрузиться / упал молча —
   *     тихо перезагружаем.
   *
   * Защита от бесконечной петли: считаем попытки в sessionStorage.
   * Не больше 2 авто-релоадов за сессию — иначе оставляем как есть.
   */
  (function () {
    var KEY = "__cae_autoreload_count";
    var VERSION_KEY = "__cae_index_version";
    // URL backend-функции логирования. Захардкожен, т.к. index.html — не Vite-модуль.
    var LOG_URL = "https://functions.poehali.dev/4f0c1ef1-4bdf-4603-8d97-63a31cb6f7a1";

    // === ШАГ 0. Сразу убиваем все Service Workers ===
    // Если когда-то на этот домен ставили SW (расширение, библиотека, прошлая
    // версия), он может перехватывать запросы и отдавать старый HTML/чанки.
    // Снимаем их безусловно при каждой загрузке.
    try {
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          for (var i = 0; i < regs.length; i++) {
            try { regs[i].unregister(); } catch (e) { /* ignore */ }
          }
        }).catch(function () {});
      }
    } catch (e) { /* ignore */ }

    function attempts() {
      try { return parseInt(sessionStorage.getItem(KEY) || "0", 10) || 0; }
      catch (e) { return 0; }
    }
    function bump() {
      try { sessionStorage.setItem(KEY, String(attempts() + 1)); }
      catch (e) { /* ignore */ }
    }

    function logRecovery(triggerType, errorMessage) {
      try {
        var payload = JSON.stringify({
          trigger_type: triggerType,
          error_message: errorMessage ? String(errorMessage).slice(0, 2000) : null,
          attempt: attempts() + 1,
          page_url: window.location.href
        });
        if (navigator.sendBeacon) {
          var blob = new Blob([payload], { type: "application/json" });
          navigator.sendBeacon(LOG_URL, blob);
        } else {
          fetch(LOG_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: payload,
            keepalive: true
          }).catch(function () {});
        }
      } catch (e) { /* ignore */ }
    }

    // === Жёсткая очистка всех клиентских кэшей ===
    function nukeCaches() {
      var promises = [];
      try {
        if ("caches" in window) {
          promises.push(
            caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k); }));
            }).catch(function () {})
          );
        }
      } catch (e) { /* ignore */ }
      try {
        if ("serviceWorker" in navigator) {
          promises.push(
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (r) {
                try { return r.unregister(); } catch (e) { return null; }
              }));
            }).catch(function () {})
          );
        }
      } catch (e) { /* ignore */ }
      return Promise.all(promises).catch(function () {});
    }

    function silentReload(triggerType, errorMessage) {
      if (attempts() >= 3) return; // защита от петли — увеличили до 3
      logRecovery(triggerType, errorMessage);
      bump();
      // Прогреваем фоном fresh-загрузку корня — это форсит браузер
      // переспросить HTML, минуя HTTP-кэш.
      try { fetch("/?__cb=" + Date.now(), { cache: "reload", credentials: "same-origin" }).catch(function () {}); } catch (e) { /* ignore */ }
      var url = new URL(window.location.href);
      url.searchParams.set("_r", String(Date.now()));
      var go = function () {
        // location.replace мобильные браузеры иногда обрабатывают как
        // soft-navigation и берут страницу из bfcache. href + новый
        // ?_r=... надёжнее — это всегда полная перезагрузка.
        try { window.location.href = url.toString(); }
        catch (e) { window.location.reload(); }
      };
      nukeCaches().then(go, go);
      // Страховка: если nuke зависнет — релоадим через 2 сек.
      setTimeout(go, 2000);
    }

    function isChunkError(msg) {
      if (!msg) return false;
      var s = String(msg);
      return /Loading chunk|Failed to fetch dynamically imported module|Importing a module script failed|ChunkLoadError|error loading dynamically imported module/i.test(s);
    }
    window.addEventListener("error", function (e) {
      var msg = e && (e.message || (e.error && e.error.message));
      if (isChunkError(msg)) silentReload("chunk_error", msg);
    });
    window.addEventListener("unhandledrejection", function (e) {
      var r = e && e.reason;
      var msg = r && (r.message || r);
      if (isChunkError(msg)) silentReload("chunk_error", msg);
    });

    // Watchdog: если React за 8 секунд ничего не отрисовал — тихо перезагружаем.
    setTimeout(function () {
      var root = document.getElementById("root");
      if (!root) return;
      var hasReactContent = false;
      for (var i = 0; i < root.children.length; i++) {
        var c = root.children[i];
        if (c.tagName !== "NOSCRIPT") { hasReactContent = true; break; }
      }
      if (!hasReactContent) silentReload("watchdog", "React did not render within 8s");
    }, 8000);

    // Через 3 секунды успешного рендера сбрасываем счётчик попыток.
    setTimeout(function () {
      var root = document.getElementById("root");
      if (!root) return;
      var ok = false;
      for (var i = 0; i < root.children.length; i++) {
        var c = root.children[i];
        if (c.tagName !== "NOSCRIPT") { ok = true; break; }
      }
      if (ok) {
        try { sessionStorage.removeItem(KEY); } catch (e) { /* ignore */ }
      }
    }, 3000);

    // === ВЕРСИОННЫЙ WATCHER ===
    // Проблема, которая остаётся даже после всех проверок выше: у пользователя
    // в локальном кэше / у CDN сидит СТАРЫЙ index.html, ссылающийся на
    // старые JS-чанки. React при этом стартует, ничего не падает, watchdog не
    // срабатывает — но контракт с бэком уже сломан, и сайт ведёт себя странно.
    //
    // Решение: запоминаем идентификатор текущего index.html (ETag или
    // Last-Modified). Дальше с интервалом тихо опрашиваем сервер с
    // `cache:'no-store'` и сравниваем — если поменялся, делаем silentReload.
    var fetchFreshHead = function () {
      return fetch("/?__v=" + Date.now(), {
        method: "GET",
        cache: "no-store",
        credentials: "same-origin",
        headers: { "Cache-Control": "no-cache", "Pragma": "no-cache" }
      }).then(function (r) {
        // Используем ETag, иначе Last-Modified, иначе length+date — главное
        // получить строку, которая меняется при изменении index.html.
        var etag = r.headers.get("ETag") || r.headers.get("Last-Modified") || "";
        if (!etag) {
          // Если сервер не отдаёт ETag (CDN иногда не пробрасывает), используем
          // длину + дата. Чтобы не читать всё тело — берём только Content-Length.
          etag = (r.headers.get("Content-Length") || "") + "|" + (r.headers.get("Date") || "");
        }
        return etag;
      });
    };

    function initVersionWatcher() {
      try {
        var saved = sessionStorage.getItem(VERSION_KEY);
        // Запоминаем первую версию через 2 сек после загрузки.
        if (!saved) {
          setTimeout(function () {
            fetchFreshHead().then(function (v) {
              if (v) {
                try { sessionStorage.setItem(VERSION_KEY, v); } catch (e) { /* ignore */ }
              }
            }).catch(function () {});
          }, 2000);
        }
        // Проверка каждые 60 секунд: появилась ли новая версия?
        setInterval(function () {
          // Не дёргаем сеть, если вкладка скрыта — телефоны и так экономят.
          if (document.hidden) return;
          fetchFreshHead().then(function (current) {
            if (!current) return;
            var prev = sessionStorage.getItem(VERSION_KEY);
            if (!prev) {
              try { sessionStorage.setItem(VERSION_KEY, current); } catch (e) { /* ignore */ }
              return;
            }
            if (prev !== current) {
              // На сервере новая версия — тихо обновляемся.
              try { sessionStorage.setItem(VERSION_KEY, current); } catch (e) { /* ignore */ }
              silentReload("version_mismatch", "index.html changed: " + prev + " -> " + current);
            }
          }).catch(function () {});
        }, 60000);
        // И один раз сразу — через 5 сек после старта (поймаем "ты пришёл со
        // старым кэшем", если он есть).
        setTimeout(function () {
          fetchFreshHead().then(function (current) {
            var prev = sessionStorage.getItem(VERSION_KEY);
            if (!current) return;
            if (prev && prev !== current) {
              try { sessionStorage.setItem(VERSION_KEY, current); } catch (e) { /* ignore */ }
              silentReload("version_mismatch_initial", "index.html changed at startup: " + prev + " -> " + current);
            } else if (!prev) {
              try { sessionStorage.setItem(VERSION_KEY, current); } catch (e) { /* ignore */ }
            }
          }).catch(function () {});
        }, 5000);
      } catch (e) { /* ignore */ }
    }
    initVersionWatcher();
  })();
</script>
