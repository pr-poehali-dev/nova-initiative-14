<div id="root">
  <noscript>

<script>
  /*
   * Тихий авто-recovery от устаревшего кэша после деплоя.
   *
   * Принцип: пользователь НЕ ДОЛЖЕН видеть никаких сообщений и кнопок.
   * Все возможные сбои чиним в фоне через hard-reload с очисткой кэша.
   *
   * Что отслеживаем:
   *  1. window.error / unhandledrejection с признаком ChunkLoadError —
   *     значит после деплоя поменялись имена чанков, у пользователя битый кэш.
   *  2. Через 8 секунд после старта проверяем, отрисовал ли React что-нибудь
   *     в #root. Если пусто — бандл не успел загрузиться / упал молча —
   *     тихо перезагружаем.
   *
   * Защита от бесконечной петли: считаем попытки в sessionStorage.
   * Не больше 2 авто-релоадов за сессию — иначе оставляем как есть.
   */
  (function () {
    var KEY = "__cae_autoreload_count";
    function attempts() {
      try { return parseInt(sessionStorage.getItem(KEY) || "0", 10) || 0; }
      catch (e) { return 0; }
    }
    function bump() {
      try { sessionStorage.setItem(KEY, String(attempts() + 1)); }
      catch (e) { /* ignore */ }
    }
    function silentReload() {
      if (attempts() >= 2) return; // защита от петли
      bump();
      var url = new URL(window.location.href);
      url.searchParams.set("_r", String(Date.now()));
      var go = function () { window.location.replace(url.toString()); };
      try {
        if ("caches" in window) {
          caches.keys().then(function (keys) {
            return Promise.all(keys.map(function (k) { return caches.delete(k); }));
          }).then(go, go);
          return;
        }
      } catch (e) { /* ignore */ }
      go();
    }
    function isChunkError(msg) {
      if (!msg) return false;
      var s = String(msg);
      return /Loading chunk|Failed to fetch dynamically imported module|Importing a module script failed|ChunkLoadError|error loading dynamically imported module/i.test(s);
    }
    window.addEventListener("error", function (e) {
      var msg = e && (e.message || (e.error && e.error.message));
      if (isChunkError(msg)) silentReload();
    });
    window.addEventListener("unhandledrejection", function (e) {
      var r = e && e.reason;
      var msg = r && (r.message || r);
      if (isChunkError(msg)) silentReload();
    });
    // Watchdog: если React за 8 секунд ничего не отрисовал — тихо перезагружаем.
    setTimeout(function () {
      var root = document.getElementById("root");
      if (!root) return;
      var hasReactContent = false;
      for (var i = 0; i < root.children.length; i++) {
        var c = root.children[i];
        if (c.tagName !== "NOSCRIPT") { hasReactContent = true; break; }
      }
      if (!hasReactContent) silentReload();
    }, 8000);
    // Если пользователь сам уже перезагрузил вручную и страница нормально
    // отрисовалась — сбросим счётчик после успешного запуска React.
    // Дадим React 3 секунды, потом снимаем флаг.
    setTimeout(function () {
      var root = document.getElementById("root");
      if (!root) return;
      var ok = false;
      for (var i = 0; i < root.children.length; i++) {
        var c = root.children[i];
        if (c.tagName !== "NOSCRIPT") { ok = true; break; }
      }
      if (ok) {
        try { sessionStorage.removeItem(KEY); } catch (e) { /* ignore */ }
      }
    }, 3000);
  })();
</script>
